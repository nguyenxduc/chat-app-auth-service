name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @chatapp/common build
      - run: pnpm --filter @chatapp/auth-service lint

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @chatapp/common build
      - run: pnpm --filter @chatapp/auth-service typecheck
      - run: pnpm --filter @chatapp/auth-service test

  e2e-test:
    runs-on: ubuntu-latest
    needs: [lint, unit-test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: chatapp_auth_service
          POSTGRES_USER: chatapp_auth_user
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U chatapp_auth_user -d chatapp_auth_service"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @chatapp/common build
      - run: pnpm --filter @chatapp/auth-service build
      - run: pnpm --filter @chatapp/auth-service test:e2e
